<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS4TheWould | PNG & JPG إلى DDS DXT5</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', sans-serif; }
    .convertio-blue { color: #00b0ff; }
    .glass { background: rgba(15,23,42,0.95); backdrop-filter: blur(16px); }
  </style>
</head>

<body class="bg-[#0f172a] text-white min-h-screen">

<header class="bg-white/5 border-b border-white/10 py-4">
  <div class="max-w-6xl mx-auto px-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-gamepad text-4xl convertio-blue"></i>
      <h1 class="text-3xl font-bold">PS4TheWould</h1>
    </div>
    <span class="bg-emerald-400 text-black px-4 py-1 rounded-full text-xs font-bold">
      DXT5 مضغوط • حجم صغير للألعاب
    </span>
  </div>
</header>

<div class="max-w-4xl mx-auto px-6 py-16">

  <div class="text-center mb-10">
    <h1 class="text-5xl font-bold mb-3">
      تحويل PNG إلى DDS <span class="text-emerald-400">(DXT5)</span>
    </h1>
    <p class="text-xl text-slate-400">تحويل حقيقي عبر السيرفر • ضغط عالي • حجم أصغر</p>
  </div>

  <!-- Upload -->
  <div id="uploadBox" onclick="fileInput.click()"
       class="glass border-4 border-dashed border-[#00b0ff] rounded-3xl p-20 text-center cursor-pointer">
    <i class="fa-solid fa-cloud-upload-alt text-8xl text-[#00b0ff] mb-8"></i>
    <p class="text-3xl font-semibold">اختر صورة</p>
    <input type="file" id="fileInput" class="hidden" onchange="handleFile(this.files[0])">
  </div>

  <!-- Preview -->
  <div id="fileReady" class="hidden mt-8 glass rounded-3xl p-8 text-center">
    <img id="previewImg" class="w-40 mx-auto mb-4 rounded-xl">
    <p id="fileNameDisplay"></p>

    <button onclick="startConversion()"
      class="mt-6 bg-gradient-to-r from-[#00b0ff] to-emerald-400 text-black px-10 py-4 rounded-xl">
      تحويل إلى DDS
    </button>
  </div>

  <!-- Progress -->
  <div id="progressSection" class="hidden mt-8 text-center">
    <p>جاري التحويل...</p>
  </div>

  <!-- Result -->
  <div id="resultSection" class="hidden mt-8 text-center">
    <p>تم التحويل ✅</p>
    <button onclick="downloadFile()" class="mt-4 bg-green-400 px-6 py-3 rounded">
      تحميل DDS
    </button>
  </div>

</div>

<script>
let currentFile = null;
let ddsBlob = null;

function handleFile(file) {
  if (!file) return;
  currentFile = file;

  uploadBox.classList.add("hidden");
  fileReady.classList.remove("hidden");

  previewImg.src = URL.createObjectURL(file);
  fileNameDisplay.textContent = file.name;
}

async function startConversion() {
  fileReady.classList.add("hidden");
  progressSection.classList.remove("hidden");

  try {
    const formData = new FormData();
    formData.append("image", currentFile);
    formData.append("format", "DXT5");

    const res = await fetch("https://your-server-url/convert", {
      method: "POST",
      body: formData
    });

    const blob = await res.blob();
    ddsBlob = blob;

    progressSection.classList.add("hidden");
    resultSection.classList.remove("hidden");

  } catch (e) {
    alert("❌ تأكد السيرفر شغال");
  }
}

function downloadFile() {
  const url = URL.createObjectURL(ddsBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = currentFile.name.replace(/\.\w+$/, ".dds");
  a.click();
}
</script>

</body>
</html>
